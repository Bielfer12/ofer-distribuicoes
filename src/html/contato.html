<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/css/contato.css">
    <link rel="stylesheet" href="/src/css/layout.css">
    <link rel="stylesheet" href="/src/css/components.css">
    <link rel="stylesheet" href="/src/css/pages/contato.css">
</head>
<body>
    <header>
        <div id="menu">
            <ion-icon id="menu-icon" name="menu-outline"></ion-icon>
        </div>
        <div class="logo">
            <img src="/src/assets/images/logo_ofer_preto.png" id="img-logo" alt="logo Ofer">
        </div>
    </header>
    <div class="all">
        <div id="open-menu">
            <button id="close-button">
                <ion-icon name="close-outline"></ion-icon>
            </button>
            <div class="names">
                <div class="categories">
                    <h2>Sobre Nós</h2>
                    <button id="row-button"><ion-icon name="chevron-forward-outline"></ion-icon></button>
                </div>
                <div class="categories">
                    <h2>Marcas</h2>
                    <button id="row-button"><ion-icon name="chevron-forward-outline"></ion-icon></button>
                </div>
                <div class="categories">
                    <h2>Catalogo</h2>
                    <button id="row-button"><ion-icon name="chevron-forward-outline"></ion-icon></button>
                </div>
                <div class="categories">
                    <h2>Contato</h2>
                    <button id="row-button"><ion-icon name="chevron-forward-outline"></ion-icon></button>
                </div>
            </div>
        </div>
        <div class="menu-contato">
            <span id="titulo-menu-contato"><b>Pronto para Qualidade?</b></span>
            <div class="descr">
                <img id="img-logo-menu-contato" src="./src/assets/images/Logo-ofer-Branca.png" alt="">
                <p id="descr-menu-contato">Seja nosso parceiro e entregue excelencia aos seus clientes</p>
            </div>
            <button id="contato-menu"><b>Contate nos</b></button>
        </div>
        <div class="icons">
            <a href="" target="_blank">
                <ion-icon name="logo-twitter"></ion-icon>
            </a>
            <a href="" target="_blank">
                <ion-icon name="logo-linkedin"></ion-icon>
            </a>
            <a href="" target="_blank">
                <ion-icon name="logo-facebook"></ion-icon>
            </a>
        </div>
        <div class="entre-em-contato">
</div>
    </div>
    <div class="entre-em-contato">
            <div class="titulo">
                <h1>Entre em</h1><h2> Contato</h2>
            </div>
            <form action="Cadastro" class="Cadastro">
                <input type="text" placeholder="Nome Completo">
                <input type="email" placeholder="E-mail">
                <input type="text" placeholder="Número de Telefone">
                    <select name="origem" id="origem">
                            <option value="">Como você nos encontrou?</option>
                            <option value="instagram">Instagram</option>
                            <option value="google">Google</option>
                            <option value="indicacao">Indicação</option>
                            <option value="facebook">Youtube</option>
                            <option value="outros">Outros</option>
                    </select>
                <button type="submit"><b>Enviar</b></button>
            </form>
        </div>



    <script type="module" src="/src/js/home.js"></script>
    <script type="module" src="/src/js/components/menu-mobile.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
